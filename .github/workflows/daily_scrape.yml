name: Daily Academic Announcements Scraper

on:
  schedule:
    # 07:00 Turkey time = 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit and push ilanlar.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git config --global url."https://x-access-token:${{ secrets.PUSH_TOKEN }}@github.com/".insteadOf "https://github.com/"

          git add ilanlar.json

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update ilanlar.json [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            for i in 1 2 3; do
              git push && echo "Push succeeded." && break
              echo "Push attempt $i failed, retrying in 5s..."
              sleep 5
            done
          fi
