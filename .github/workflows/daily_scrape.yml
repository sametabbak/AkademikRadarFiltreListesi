name: Daily Academic Announcements Scraper

on:
  schedule:
    - cron: "0 6 * * *"  # günde 1 kez
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sistem paketleri
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
          sudo apt-get install -y tesseract-ocr-tur
          sudo apt-get install -y poppler-utils

      - name: Requirements
        run: pip install -r requirements.txt

      - name: Scraper çalıştır
        run: python scraper.py

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ilanlar.json
          git commit -m "update data" || echo "no changes"
          git push
